<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo Web Moderno</title>
    <!-- Importando la fuente Inter de Google Fonts para un aspecto más moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Variables CSS para facilitar el cambio de colores */
        :root {
            --primary-color: #6366f1;
            /* Color índigo */
            --primary-hover: #4f46e5;
            --surface-color: #ffffff;
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        /* Reseteo básico de estilos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            /* Centrar el contenido en la pantalla */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Estilos de la tarjeta principal */
        .card {
            background: var(--surface-color);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 90%;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Efecto al pasar el mouse por encima de la tarjeta */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Estilos del botón */
        .button {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 0.875rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
        }

        /* Efecto al pasar el mouse por encima del botón */
        .button:hover {
            background-color: var(--primary-hover);
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>

<body>

    <!-- Contenedor de la tarjeta -->
    <div class="card">
        <h1>¡Hola, Mundo!</h1>
        <p>Este es un ejemplo de una tarjeta moderna y responsiva construida con HTML5 y CSS3 puro. Cuenta con un diseño
            limpio y animaciones sutiles.</p>
        <a href="#" class="button">Empezar ahora</a>
    </div>

</body>

</html>
